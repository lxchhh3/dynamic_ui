<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>secretseasoning.top</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
html,body{margin:0;height:100%;background:#0b0d12;color:#d7dce5;font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;display:grid;place-items:center}
.box{max-width:520px;padding:2.5rem 2.25rem;border:1px solid #222836;border-radius:12px;background:#141821;box-shadow:0 0 48px rgba(108,140,255,0.05)}
h1{margin:0 0 .35rem;font-size:1.35rem;font-weight:500;letter-spacing:-.015em}
p{margin:.35rem 0;color:#7b8597;font-family:ui-monospace,Consolas,monospace;font-size:13px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#6c8cff;margin-right:.5rem;vertical-align:middle;animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
</style>
</head>
<body>
<div class="box">
<h1>secretseasoning.top</h1>
<p><span class="dot"></span>standing by &mdash; custom_ui incoming</p>
</div>
</body>
</html>
