services:
  db:
    image: postgres:16-alpine
    container_name: custom-ui-db
    environment:
      POSTGRES_DB: custom_ui
      POSTGRES_USER: custom_ui
      POSTGRES_PASSWORD: custom_ui_dev
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - custom_ui_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U custom_ui -d custom_ui"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  custom_ui_pgdata:
