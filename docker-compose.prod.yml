services:
  db:
    image: postgres:16-alpine
    container_name: custom-ui-db
    environment:
      POSTGRES_DB: custom_ui
      POSTGRES_USER: custom_ui
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - custom_ui_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U custom_ui -d custom_ui"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build: ./backend
    container_name: custom-ui-api
    environment:
      DATABASE_URL: postgresql+asyncpg://custom_ui:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/custom_ui
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_DAYS: "7"
      CORS_ORIGINS: "https://secretseasoning.top,https://www.secretseasoning.top"
      LOG_LEVEL: INFO
      # Hybrid LLM (Phase 6). Unset in the .env → feature off (deterministic).
      # Set to http://host.docker.internal:8001/render on this VPS to route
      # via the 5070Ti reverse tunnel.
      LLM_RENDER_URL: ${LLM_RENDER_URL:-}
    ports:
      # Bind to loopback only — nginx on the host reverse-proxies public traffic.
      - "127.0.0.1:8000:8000"
    # host.docker.internal routes to the VPS host gateway, where the 5070Ti
    # tunnel terminates at 127.0.0.1:8001.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  custom_ui_pgdata:
