server {
    server_name secretseasoning.top www.secretseasoning.top;

    # Static frontend served directly by nginx.
    root /home/ubuntu/custom-ui/frontend/dist;
    index index.html;

    # Basic hardening
    client_max_body_size 1m;

    # Security headers. CSP blocks inline scripts + unsafe-eval per the LLM
    # security model (STATUS.md). `unsafe-inline` is kept on style-src because
    # Framer Motion writes inline style attributes for animated values; pure
    # class-only pages don't need it.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    # LLM component picker — proxied to 5070 Ti via SSH reverse tunnel on :8001
    # Exact-match locations win over the /api/ prefix block below.
    location = /api/render {
        proxy_pass http://127.0.0.1:8001/render;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
        client_max_body_size  32k;
    }

    location = /api/healthz {
        proxy_pass http://127.0.0.1:8001/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout    5s;
    }

    # SSE endpoint: disable buffering, long timeouts, keep connection alive.
    location = /api/chat {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # REST API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache-bust the hashed asset files
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/secretseasoning.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/secretseasoning.top/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.secretseasoning.top) {
        return 301 https://$host$request_uri;
    }
    if ($host = secretseasoning.top) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name secretseasoning.top www.secretseasoning.top;
    return 404;
}
